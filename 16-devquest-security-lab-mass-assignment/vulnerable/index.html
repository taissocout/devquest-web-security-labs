<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 16 — Mass Assignment ⚠️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="tag vuln">⚠ VULNERABLE</div>
      <h1>Mass Assignment</h1>
      <p>Objeto do usuário sendo atualizado com tudo que chega do cliente.</p>
    </header>

    <section class="grid">
      <div class="card">
        <h2>Payload enviado</h2>
        <textarea id="payloadInput" class="field area"></textarea>
        <div class="actions">
          <button class="btn-primary" onclick="sendPayload()">Enviar update</button>
          <button class="btn-secondary" onclick="loadExploit()">Carregar exploit</button>
        </div>
      </div>

      <div class="card">
        <h2>Usuário antes</h2>
        <pre id="beforeOut"></pre>
      </div>

      <div class="card wide">
        <h2>Usuário depois</h2>
        <pre id="afterOut"></pre>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
