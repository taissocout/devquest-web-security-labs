<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 07 — Login Mock ✅ FIXED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="tag safe">✅ FIXED</div>
      <h1>Login Mock Seguro</h1>
      <p class="subtitle">Front-end sem segredo hardcoded e com validação delegada ao backend.</p>

      <div class="field">
        <label>Usuário</label>
        <input id="user" type="text" placeholder="analista">
      </div>

      <div class="field">
        <label>Senha</label>
        <input id="pass" type="password" placeholder="••••••••">
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="login()">Entrar</button>
        <button class="btn-secondary" onclick="showHints()">Ver arquitetura</button>
      </div>

      <div id="result" class="result hidden"></div>

      <div class="hint-box">
        <div class="hint-title">// Painel de observação</div>
        <code id="devPanel">Aguardando interação...</code>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
