<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    CORRIGIDO:
    frame-ancestors 'none' impede enquadramento em iframe.
    Em backend real, também pode existir X-Frame-Options: DENY
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; frame-ancestors 'none';">

  <title>Lab 12 — Clickjacking ✅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div class="tag safe">✅ FIXED</div>
      <h1>Clickjacking Mitigado</h1>
      <p>Uso de <code>frame-ancestors 'none'</code> para impedir iframes.</p>
    </header>

    <section class="card">
      <div class="card-head">
        <span>Painel bancário demo</span>
        <span>LAB-12</span>
      </div>

      <div class="card-body">
        <p class="lead">
          Esta versão foi pensada para não ser carregada por sites terceiros em frame.
        </p>

        <div class="account-box">
          <div class="balance-label">Saldo</div>
          <div class="balance">R$ 48.920,00</div>
        </div>

        <div class="actions">
          <button class="btn-danger" onclick="transferMoney()">Transferir R$ 10.000</button>
          <button class="btn-secondary" onclick="showProtection()">Ver proteção</button>
        </div>

        <div id="result" class="result hidden"></div>

        <div class="mock-frame-box">
          <div class="frame-title">// Proteções</div>
          <div class="result">
            frame-ancestors 'none'<br>
            X-Frame-Options: DENY
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
